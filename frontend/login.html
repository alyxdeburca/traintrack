<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainTrack — Sign In</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .google-signin {
            margin: 30px 0;
        }

        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .loading {
            display: none;
            margin: 15px 0;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🚂 TrainTrack</h1>
        <p class="subtitle">Real-time Irish Rail tracking</p>

        <div id="google_signin_button" class="google-signin"></div>
        <div class="loading" id="loading">Signing in...</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        const googleClientId = "{{ google_client_id }}";

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: googleClientId,
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("google_signin_button"),
                { theme: "outline", size: "large", width: "300" }
            );
        };

        async function handleCredentialResponse(response) {
            const loadingEl = document.getElementById("loading");
            const errorEl = document.getElementById("error");

            loadingEl.style.display = "block";
            errorEl.style.display = "none";

            try {
                const res = await fetch("/auth/google", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: response.credential })
                });

                if (res.ok) {
                    window.location.href = "/";
                } else {
                    const data = await res.json();
                    errorEl.textContent = data.detail || "Authentication failed";
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = "Network error: " + err.message;
                errorEl.style.display = "block";
            } finally {
                loadingEl.style.display = "none";
            }
        }
    </script>
</body>
</html>
